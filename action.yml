name: 'Run Julia test items'
description: 'Run tests that are based on the test item framework'
inputs:
  juliaup-channel:
    required: false
  results-path:
    type: string
    required: false
  env:
    required: false
    default: ""
  filter:
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Setup Julia and compute cache keys
      id: setup
      shell: bash
      run: |
        juliaup add release
        echo "JULIA_VERSION=$(julia +release -v)" >> $GITHUB_OUTPUT
        echo "MANIFEST_HASH=$(sha256sum "$GITHUB_ACTION_PATH/Manifest.toml" | cut -d ' ' -f1)" >> $GITHUB_OUTPUT
    - uses: actions/cache/restore@v4
      id: cache-project
      with:
        path: ${{ runner.tool_cache }}/julia-run-testitems-depot
        key: julia-run-testitems-v2-${{ runner.os }}-${{ steps.setup.outputs.JULIA_VERSION }}-${{ steps.setup.outputs.MANIFEST_HASH }}
        restore-keys: |
          julia-run-testitems-v2-${{ runner.os }}-${{ steps.setup.outputs.JULIA_VERSION }}-
          julia-run-testitems-v2-${{ runner.os }}-
    - name: Install and precompile
      if: steps.cache-project.outputs.cache-hit != 'true'
      run: julia +release -e 'import Pkg; Pkg.instantiate()'
      shell: bash
      env:
        JULIA_PROJECT: ${{ github.action_path }}
        JULIA_DEPOT_PATH: ${{ runner.tool_cache }}/julia-run-testitems-depot
    - uses: actions/cache/save@v4
      if: steps.cache-project.outputs.cache-hit != 'true'
      with:
        path: ${{ runner.tool_cache }}/julia-run-testitems-depot
        key: julia-run-testitems-v2-${{ runner.os }}-${{ steps.setup.outputs.JULIA_VERSION }}-${{ steps.setup.outputs.MANIFEST_HASH }}
    - name: Run test items
      run: julia +release --project=${{ github.action_path }} ${{ github.action_path }}/main.jl ${{ runner.debug==1 && 'debug' || 'nodebug' }}
      shell: pwsh
      env:
        JULIA_DEPOT_PATH: ${{ runner.tool_cache }}/julia-run-testitems-depot
        TEST_JULIAUP_CHANNEL: ${{ inputs.juliaup-channel }}
        TEST_ENV: ${{ inputs.env }}
        TEST_FILTER: ${{ inputs.filter }}
        RESULTS_PATH: ${{ inputs.results-path }}
        JULIA_DEBUG: "TestItemControllers"
